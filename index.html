<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Pipeline Console</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            text-align: center;
            max-width: 450px;
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
            font-size: 2rem;
        }
        p {
            color: #94a3b8;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            background-color: #059669;
            color: #ecfdf5;
            padding: 0.35rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>CentOS Pipeline v2.0</h1>
        <p>This deployment ecosystem is driven by automated Git syncs, local container runtimes, and strict firewall configurations.</p>
        <span class="status-badge">● INFRASTRUCTURE LIVE</span>
    </div>

</body>
</html>
